<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reial</title>
    <meta name="description" content="Reial">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', system_ui, sans-serif;
            background-image: 
                linear-gradient(rgba(10, 10, 10, 0.65), rgba(10, 10, 10, 0.78)),
                url('new-dragon-bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #0a0a0a;
        }
        
        .font-display {
            font-family: 'Cinzel', 'Inter', serif;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: #18181b;
            min-width: 220px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            z-index: 100;
            padding: 8px 0;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .dropdown-content a {
            color: #e4e4e7;
            padding: 10px 20px;
            text-decoration: none;
            display: block;
            font-size: 14px;
        }

        .dropdown-content a:hover {
            background-color: #27272a;
            color: #facc15;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    
    <!-- Nav -->
    <nav class="border-b border-white/10 bg-black/40 backdrop-blur-lg sticky top-0 z-50">
        <div class="max-w-screen-xl mx-auto px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex items-center gap-x-3">
                    <img src="dragon-logo.jpg" alt="Reial Logo" class="w-12 h-12 rounded-2xl object-cover border border-white/20">
                    <span class="font-display text-2xl font-semibold tracking-tighter">Reial</span>
                </div>

                <!-- Estonia Radio Dropdown -->
                <div class="dropdown">
                    <button class="flex items-center gap-x-2 px-5 py-2.5 rounded-2xl border border-white/20 hover:bg-white/5 transition-colors text-sm">
                        <i class="fa-solid fa-broadcast-tower"></i>
                        <span>Estonia Radio</span>
                        <i class="fa-solid fa-chevron-down text-xs ml-1"></i>
                    </button>
                    
                    <div class="dropdown-content">
                        <a href="https://sky.babahhcdn.com/live.mp3" target="_blank">Sky Plus</a>
                        <a href="https://elmar.babahhcdn.com/live.mp3" target="_blank">Raadio Elmar</a>
                        <a href="https://power.babahhcdn.com/live.mp3" target="_blank">Power Hit Radio</a>
                        <a href="https://retro.babahhcdn.com/live.mp3" target="_blank">Retro FM</a>
                        <a href="https://r2.err.ee/live" target="_blank">Raadio 2</a>
                        <a href="https://vikerraadio.err.ee/live" target="_blank">Vikerraadio</a>
                        <a href="https://klassikaraadio.err.ee/live" target="_blank">Klassikaraadio</a>
                        <a href="https://starfm.babahhcdn.com/live.mp3" target="_blank">Star FM</a>
                        <a href="https://radiomix.babahhcdn.com/live.mp3" target="_blank">Radio Mix</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <div class="flex items-center justify-center min-h-[80vh]">
        <div class="text-center px-8">
            <h1 class="font-display text-[120px] md:text-[150px] leading-none tracking-tighter font-semibold">Reial</h1>
            <p class="text-white/60 mt-6 text-xl">Estonia</p>
        </div>
    </div>

</body>
</html>
